*{box-sizing:border-box;margin:0;padding:0}
:root{--fp-dark:#304F59;--fp-teal:#00A19E;--fp-amber:#D4873A;--fp-cream:#F7F4F0;--fp-warm:#cfc9bb}
body{font-family:'Arboria',sans-serif;font-weight:400;background:var(--fp-cream)}
.cal-head{background:var(--fp-dark);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.cal-title{font-family:'AppetitePro',sans-serif;font-weight:900;font-size:22px;color:#fff;flex-shrink:0}
.head-center{display:flex;align-items:center;gap:8px;flex:1;justify-content:center;flex-wrap:wrap}
.month-nav{display:flex;align-items:center;gap:6px}
.month-label{font-family:'Arboria',sans-serif;font-weight:700;font-size:14px;color:#fff;min-width:130px;text-align:center}
.nav-btn{background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.3);border-radius:5px;width:32px;height:32px;cursor:pointer;color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0}
.nav-btn:hover{background:rgba(255,255,255,0.35)}
.filter-tabs{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.ftab{font-family:'Arboria',sans-serif;font-weight:700;font-size:11px;padding:5px 11px;border-radius:5px;cursor:pointer;border:1px solid rgba(255,255,255,0.25);background:transparent;color:rgba(255,255,255,0.7);white-space:nowrap}
.ftab:hover{background:rgba(255,255,255,0.12);color:#fff}
.ftab.active{background:var(--fp-teal);border-color:var(--fp-teal);color:#fff}
.ftab.compare-active{background:var(--fp-amber);border-color:var(--fp-amber);color:#fff}
.add-btn{background:var(--fp-teal);color:#fff;border:none;border-radius:5px;padding:8px 16px;font-family:'Arboria',sans-serif;font-weight:700;font-size:12px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.add-btn:hover{filter:brightness(1.1)}
.secondary-add{background:transparent;border:1px solid rgba(255,255,255,0.5);color:#fff}
.secondary-add:hover{background:rgba(255,255,255,0.12);filter:none}
.sub-bar{background:#fff;border-bottom:1px solid var(--fp-warm);padding:9px 18px;display:flex;gap:12px;flex-wrap:wrap;align-items:center;justify-content:space-between}
.legend-items{display:flex;gap:14px;flex-wrap:wrap;align-items:center}
.li{display:flex;align-items:center;gap:5px;font-family:'Arboria',sans-serif;font-size:11px;color:#555}
.ld{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.range-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.range-bar label{font-family:'Arboria',sans-serif;font-weight:700;font-size:10px;color:#999;text-transform:uppercase;letter-spacing:.05em}
.range-bar input[type=date]{font-family:'Arboria',sans-serif;font-size:11px;padding:4px 8px;border:1px solid #ddd;border-radius:5px;color:#333}
.range-apply{font-family:'Arboria',sans-serif;font-weight:700;font-size:11px;padding:5px 12px;border-radius:5px;cursor:pointer;border:none;background:var(--fp-teal);color:#fff}
.range-apply:hover{filter:brightness(1.1)}
.range-clear{font-family:'Arboria',sans-serif;font-weight:700;font-size:11px;padding:5px 10px;border-radius:5px;cursor:pointer;border:1px solid #ddd;background:#fff;color:#666}
.range-clear:hover{background:#f5f5f5}
.range-tag{font-family:'Arboria',sans-serif;font-weight:700;font-size:11px;color:var(--fp-teal);background:#E0F5F5;padding:4px 10px;border-radius:99px}
.multi-month{display:flex;flex-direction:column}
.month-section{border-bottom:2px solid var(--fp-warm)}
.month-section-head{background:var(--fp-dark);padding:8px 18px}
.month-section-head h3{font-family:'AppetitePro',sans-serif;font-weight:900;font-size:17px;color:#fff}
.day-names{display:grid;grid-template-columns:repeat(7,1fr);background:rgba(48,79,89,0.9)}
.dn{font-family:'Arboria',sans-serif;font-weight:700;font-size:10px;color:rgba(255,255,255,0.65);text-align:center;padding:6px 0;letter-spacing:.08em;text-transform:uppercase;border-right:1px solid rgba(255,255,255,0.1)}
.dn:last-child{border-right:none}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);border-left:1px solid var(--fp-warm);border-top:1px solid var(--fp-warm)}
.cell{background:#fff;border-right:1px solid var(--fp-warm);border-bottom:1px solid var(--fp-warm);min-height:100px;padding:8px 7px 6px;cursor:pointer}
.cell:hover{background:#faf8f5}
.cell.other{background:var(--fp-cream);cursor:default}
.cell.other .cell-day{color:#bbb}
.cell.today{background:#e6f7f7}
.cell.in-range{outline:2px solid var(--fp-teal);outline-offset:-2px}
.cell-day{font-family:'Arboria',sans-serif;font-weight:700;font-size:17px;color:var(--fp-dark);line-height:1;margin-bottom:5px}
.cell.today .cell-day{color:var(--fp-teal)}
.today-dot{display:inline-block;width:6px;height:6px;background:var(--fp-teal);border-radius:50%;margin-left:4px;vertical-align:middle;margin-bottom:2px}
.pill{display:flex;align-items:center;gap:4px;margin-bottom:3px;padding:3px 6px;border-radius:4px;cursor:pointer}
.pill:hover{filter:brightness(0.95)}
.pill.dragging{opacity:0.4;cursor:grabbing}
.cell.drag-over{outline:2px dashed var(--fp-teal);background:rgba(0,161,158,0.06)}
.pill-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.pill-text{font-family:'Arboria',sans-serif;font-weight:400;font-size:10px;color:#333;white-space:normal;overflow:hidden;flex:1;min-width:0;line-height:1.4}
.more{font-family:'Arboria',sans-serif;font-size:10px;color:var(--fp-teal);padding:2px 0 0 2px;cursor:pointer}
.more:hover{text-decoration:underline}
.compare-wrap{display:grid;grid-template-columns:1fr 1fr;border-top:3px solid var(--fp-warm)}
.compare-panel{border-right:2px solid var(--fp-warm)}
.compare-panel:last-child{border-right:none}
.compare-head{padding:10px 14px}
.compare-head-title{font-family:'AppetitePro',sans-serif;font-weight:900;font-size:18px;color:#fff}
.compare-head-sub{font-family:'Arboria',sans-serif;font-size:11px;color:rgba(255,255,255,0.7);margin-top:2px}
.compare-range-inputs{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:8px 14px;background:#f9f7f4;border-bottom:1px solid var(--fp-warm)}
.compare-range-inputs label{font-family:'Arboria',sans-serif;font-weight:700;font-size:10px;color:#999;text-transform:uppercase;letter-spacing:.04em}
.compare-range-inputs input[type=date]{font-family:'Arboria',sans-serif;font-size:11px;padding:4px 7px;border:1px solid #ddd;border-radius:5px;color:#333}
.compare-apply{font-family:'Arboria',sans-serif;font-weight:700;font-size:11px;padding:5px 10px;border-radius:5px;cursor:pointer;border:none;color:#fff}
.stats-bar{display:flex;border-bottom:1px solid var(--fp-warm)}
.stat{flex:1;padding:10px 12px;border-right:1px solid var(--fp-warm);text-align:center}
.stat:last-child{border-right:none}
.stat-num{font-family:'AppetitePro',sans-serif;font-weight:900;font-size:24px;color:var(--fp-dark)}
.stat-label{font-family:'Arboria',sans-serif;font-size:10px;color:#999;text-transform:uppercase;letter-spacing:.04em;margin-top:2px}
.pillar-bars{padding:12px 14px;border-bottom:1px solid var(--fp-warm)}
.pillar-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.pillar-bar-label{font-family:'Arboria',sans-serif;font-weight:700;font-size:10px;color:#555;min-width:80px}
.pillar-bar-track{flex:1;background:#eee;border-radius:99px;height:8px;overflow:hidden}
.pillar-bar-fill{height:8px;border-radius:99px}
.pillar-bar-count{font-family:'Arboria',sans-serif;font-weight:700;font-size:10px;color:#555;min-width:20px;text-align:right}
.compare-list{padding:10px 14px;max-height:300px;overflow-y:auto}
.compare-list-item{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid var(--fp-warm);cursor:pointer}
.compare-list-item:hover .cli-subject{color:var(--fp-teal)}
.compare-list-item:last-child{border-bottom:none}
.cli-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:3px}
.cli-date{font-family:'Arboria',sans-serif;font-weight:700;font-size:10px;color:#999;white-space:nowrap;min-width:60px}
.cli-subject{font-family:'Arboria',sans-serif;font-size:11px;color:#333;line-height:1.4}
.cli-empty{font-family:'Arboria',sans-serif;font-size:12px;color:#aaa;padding:20px 0;text-align:center}
.overlay{position:fixed;inset:0;background:rgba(30,40,44,0.35);z-index:300;display:flex;align-items:center;justify-content:center}
.panel{background:#fff;border-radius:10px;width:340px;max-width:94vw;overflow:hidden}
.panel-head{padding:14px 16px;display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.panel-head h3{font-family:'AppetitePro',sans-serif;font-weight:900;font-size:19px;color:#fff;line-height:1.3;flex:1}
.pdate{font-family:'Arboria',sans-serif;font-size:11px;color:rgba(255,255,255,0.7);margin-bottom:3px}
.close-btn{background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.3);border-radius:4px;width:26px;height:26px;cursor:pointer;color:#fff;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.close-btn:hover{background:rgba(255,255,255,0.35)}
.panel-body{padding:14px 16px}
.dr{display:flex;gap:10px;margin-bottom:9px;align-items:flex-start}
.dl{font-family:'Arboria',sans-serif;font-weight:700;font-size:10px;color:#999;min-width:58px;text-transform:uppercase;letter-spacing:.05em;padding-top:2px}
.dv{font-family:'Arboria',sans-serif;font-size:12px;color:#333;flex:1;line-height:1.5}
.sep{border:none;border-top:1px solid var(--fp-warm);margin:10px 0}
.pactions{display:flex;gap:8px;justify-content:flex-end}
.pbtn{font-family:'Arboria',sans-serif;font-weight:700;font-size:11px;padding:6px 14px;border-radius:5px;cursor:pointer;border:1px solid #ddd;background:#fff;color:#444}
.pbtn:hover{background:#f5f5f5}
.pbtn.danger{color:#991B1B;border-color:#fca5a5}
.pbtn.primary{background:var(--fp-dark);color:#fff;border-color:var(--fp-dark)}
.pbtn.primary:hover{background:#253e47}
.badge{font-family:'Arboria',sans-serif;font-weight:700;display:inline-flex;align-items:center;font-size:10px;padding:2px 9px;border-radius:99px}
.form-body{padding:14px 16px}
.fg{margin-bottom:10px}
.fg label{font-family:'Arboria',sans-serif;font-weight:700;font-size:10px;color:#999;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:3px}

var GH_USER='MJ-Studio108';
var GH_REPO='edm-planner';

var GH_API='https://api.github.com/repos/'+GH_USER+'/'+GH_REPO+'/contents/'+GH_FILE;
function getGHToken(){return localStorage.getItem('gh_token')||'';}

function getDigest(cb){cb(getGHToken());}

function setSyncStatus(msg,col){
  var el=document.getElementById('sync-status');
  if(!el)return;
  el.textContent=msg;
  el.style.color=col||'rgba(255,255,255,0.7)';
  el.style.display=msg?'inline':'none';
}
function persist(){
  var token=getGHToken();
  if(!token){fallbackPersist(JSON.stringify({items:items,nid:nid,pillars:PILLARS,sbadge:SBADGE}));return;}
  var payload=JSON.stringify({items:items,nid:nid,pillars:PILLARS,sbadge:SBADGE});
  /* Get current file SHA first (required by GitHub API for updates) */
  fetch(GH_API+'?ref='+GH_BRANCH,{headers:{'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json'}})
    .then(function(r){return r.ok?r.json():null;})
    .then(function(d){
      var sha=d&&d.sha?d.sha:undefined;
      var body={message:'Update calendar data',content:btoa(unescape(encodeURIComponent(payload))),branch:GH_BRANCH};
      if(sha)body.sha=sha;
      return fetch(GH_API,{
        method:'PUT',
        headers:{'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},
        body:JSON.stringify(body)
      });
    })
    .then(function(r){
      if(r&&r.ok){setSyncStatus('Synced ✓','#22C55E');setTimeout(function(){setSyncStatus('');},3000);}
      else{setSyncStatus('Sync failed ✗','#EF4444');fallbackPersist(payload);}
    })
    .catch(function(){setSyncStatus('Sync failed ✗','#EF4444');fallbackPersist(payload);});
}
function manualSync(){
  var token=getGHToken();
  if(!token){openTokenSetup();return;}
  setSyncStatus('Syncing...','rgba(255,255,255,0.7)');
  persist();
}

function fallbackPersist(payload){
  try{localStorage.setItem('fp_cal_data',payload);}catch(e){}
}

function loadStored(){
  var token=getGHToken();
  var headers={'Accept':'application/vnd.github.v3.raw'};
  if(token)headers['Authorization']='token '+token;
  setSyncStatus('Loading...','rgba(255,255,255,0.7)');
  fetch(GH_API+'?ref='+GH_BRANCH+'&t='+Date.now(),{headers:headers})
    .then(function(r){
      if(!r.ok)throw new Error('not found');
      return r.json();
    })
    .then(function(d){
      if(d&&d.items&&d.items.length){
        applyData(d);
        setSyncStatus('');
        renderLegend();render();
      } else { throw new Error('empty'); }
    })
    .catch(function(){
      setSyncStatus('');
      try{
        items=DEFAULT_ITEMS.slice();nid=2033;
        var raw=localStorage.getItem('fp_cal_data');
        if(raw){
          var saved=JSON.parse(raw);
          if(saved.items){
            var existingIds=new Set(items.map(function(x){return x.id;}));
            saved.items.forEach(function(x){if(!existingIds.has(x.id)){items.push(x);}else{var idx=items.findIndex(function(y){return y.id===x.id;});if(idx>-1)items[idx]=x;}});
          }
          if(saved.nid&&saved.nid>nid)nid=saved.nid;
          if(saved.pillars)Object.keys(saved.pillars).forEach(function(k){PILLARS[k]=saved.pillars[k];});
          if(saved.sbadge)Object.keys(saved.sbadge).forEach(function(k){SBADGE[k]=saved.sbadge[k];});
        }
      }catch(e){items=DEFAULT_ITEMS.slice();nid=2033;}
      renderLegend();render();
    });
}

function applyData(d){
  if(d.items){items=d.items;}else{items=DEFAULT_ITEMS.slice();}
  if(d.nid){nid=d.nid;}else{nid=12;}
  if(d.pillars){Object.keys(d.pillars).forEach(function(k){PILLARS[k]=d.pillars[k];});}
  if(d.sbadge){Object.keys(d.sbadge).forEach(function(k){SBADGE[k]=d.sbadge[k];});}
}

function pad(n){return String(n).padStart(2,'0');}
function dkey(y,m,d){return y+'-'+pad(m+1)+'-'+pad(d);}
function parseDate(s){var p=s.split('-');return new Date(+p[0],+p[1]-1,+p[2]);}
function fmtDate(d){return d.toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'});}
function inRange(dateStr,s,e){if(!s||!e)return false;var d=parseDate(dateStr);return d>=s&&d<=e;}

function getViewMonths(){
  var y=cur.getFullYear(),m=cur.getMonth(),arr=[],i,nm,ny;
  if(viewMode==='month')return [{y:y,m:m}];
  var count=viewMode==='3months'?3:viewMode==='6months'?6:12;
  var startM=viewMode==='year'?0:m;
  var startY=y;
  for(i=0;i<count;i++){nm=startM+i;ny=startY;while(nm>11){nm-=12;ny++;}arr.push({y:ny,m:nm});}
  return arr;
}

function renderMonthGrid(y,m){
  var fd=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate(),dp=new Date(y,m,0).getDate();
  var total=Math.ceil((fd+dim)/7)*7;
  var html='<div class="day-names">';
  for(var d=0;d<7;d++)html+='<div class="dn">'+DAYSHORT[d]+'</div>';
  html+='</div><div class="cal-grid">';
  for(var i=0;i<total;i++){
    var day,mo=m,yr=y,other=false;
    if(i<fd){day=dp-fd+i+1;mo=m-1;if(mo<0){mo=11;yr--;}other=true;}
    else if(i>=fd+dim){day=i-fd-dim+1;mo=m+1;if(mo>11){mo=0;yr++;}other=true;}
    else{day=i-fd+1;}
    var key=dkey(yr,mo,day);
    var isToday=(yr===now.getFullYear()&&mo===now.getMonth()&&day===now.getDate());
    var inR=rangeStart&&rangeEnd&&inRange(key,rangeStart,rangeEnd);
    var dc=items.filter(function(c){return c.date===key;});
    var cls='cell'+(other?' other':'')+(isToday?' today':'')+(inR?' in-range':'');
    var dot=isToday?'<span class="today-dot"></span>':'';
    // Build cell using DOM to avoid any attribute quoting issues
    html+='<div class="'+cls+'" data-key="'+key+'" data-other="'+(other?'1':'0')+'">'
         +'<div class="cell-day">'+day+dot+'</div>';
    dc.slice(0,3).forEach(function(c){
      var p=PILLARS[c.pillar]||{bg:'#888',light:'#eee'};
      var dotCol=STATUS_DOT[c.status]||p.bg;
      html+='<div class="pill" data-id="'+c.id+'" style="background:'+p.light+';" draggable="true">'
           +'<span class="pill-dot" style="background:'+dotCol+';"></span>'
           +'<span class="pill-text">'+(c.campaignName?escHtml(c.campaignName):escHtml(c.subject))+'</span>'
           +'<span style="font-size:9px;color:#666;margin-left:3px;flex-shrink:0;">['+c.channel+']</span>'
           +'</div>';
    });
    if(dc.length>3){
      html+='<div class="more" data-key="'+key+'" data-yr="'+yr+'" data-mo="'+mo+'" data-day="'+day+'">+'+(dc.length-3)+' more</div>';
    }
    html+='</div>';
  }
  html+='</div>';
  return html;
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function renderCalendar(){
  var months=getViewMonths();
  if(viewMode==='year'){
    document.getElementById('mlabel').textContent=cur.getFullYear();
  } else if(viewMode==='month'){
    document.getElementById('mlabel').textContent=cur.toLocaleString('default',{month:'long',year:'numeric'});
  } else {
    var first=months[0],last=months[months.length-1];
    document.getElementById('mlabel').textContent=
      new Date(first.y,first.m,1).toLocaleString('default',{month:'short',year:'numeric'})
      +' \u2013 '+new Date(last.y,last.m,1).toLocaleString('default',{month:'short',year:'numeric'});
  }
  var rt=document.getElementById('range-tag');
  if(rangeStart&&rangeEnd){rt.textContent=fmtDate(rangeStart)+' \u2014 '+fmtDate(rangeEnd);rt.style.display='inline-flex';}
  else{rt.style.display='none';}

  var container=document.getElementById('cal-container');
  if(viewMode==='month'){
    container.innerHTML=renderMonthGrid(months[0].y,months[0].m);
  } else {
    var html='<div class="multi-month">';
    months.forEach(function(mo){
      var label=new Date(mo.y,mo.m,1).toLocaleString('default',{month:'long',year:'numeric'});
      html+='<div class="month-section"><div class="month-section-head"><h3>'+label+'</h3></div>'+renderMonthGrid(mo.y,mo.m)+'</div>';
    });
    html+='</div>';
    container.innerHTML=html;
  }
}

function renderCompare(){
  var container=document.getElementById('cal-container');
  var aItems=compareA.start&&compareA.end?items.filter(function(c){return inRange(c.date,compareA.start,compareA.end);}):[];
  var bItems=compareB.start&&compareB.end?items.filter(function(c){return inRange(c.date,compareB.start,compareB.end);}):[];

  function stats(it){
    var pc={};Object.keys(PILLARS).forEach(function(p){pc[p]=0;});
    it.forEach(function(c){if(pc[c.pillar]!==undefined)pc[c.pillar]++;});
    var days=it.map(function(c){return c.date;}).filter(function(v,i,a){return a.indexOf(v)===i;}).length;
    return {total:it.length,days:days,pc:pc};
  }
  function bars(pc,total){
    var h='<div class="pillar-bars">';
    Object.keys(PILLARS).forEach(function(p){
      var n=pc[p]||0,pct=total>0?Math.round(n/total*100):0,pg=PILLARS[p];
      h+='<div class="pillar-bar-row"><div class="pillar-bar-label">'+p+'</div>'
        +'<div class="pillar-bar-track"><div class="pillar-bar-fill" style="width:'+pct+'%;background:'+pg.bg+'"></div></div>'
        +'<div class="pillar-bar-count">'+n+'</div></div>';
    });
    return h+'</div>';
  }
  function list(it){
    if(!it.length)return '<div class="compare-list"><div class="cli-empty">No campaigns in this range</div></div>';
    var sorted=it.slice().sort(function(a,b){return a.date>b.date?1:-1;});
    var h='<div class="compare-list">';
    sorted.forEach(function(c){
      var p=PILLARS[c.pillar]||{bg:'#888'};
      var ds=parseDate(c.date).toLocaleDateString('en-AU',{day:'numeric',month:'short'});
      h+='<div class="compare-list-item" data-id="'+c.id+'" style="cursor:pointer">'
        +'<span class="cli-dot" style="background:'+p.bg+'"></span>'
        +'<span class="cli-date">'+ds+'</span>'
        +'<span class="cli-subject">'+(c.campaignName?escHtml(c.campaignName):escHtml(c.subject))+'</span>'
        +'<span style="font-size:10px;color:#888;margin-left:6px;">['+c.channel+']</span></div>';
    });
    return h+'</div>';
  }
  function panel(label,range,it,headColor,pfx){
    var s=stats(it);
    var sub=range.start&&range.end?fmtDate(range.start)+' \u2014 '+fmtDate(range.end):'Select a date range below';
    var sv=range.start?range.start.toISOString().slice(0,10):'';
    var ev=range.end?range.end.toISOString().slice(0,10):'';
    return '<div class="compare-panel">'
      +'<div class="compare-head" style="background:'+headColor+'"><div>'
      +'<div class="compare-head-title">'+label+'</div>'
      +'<div class="compare-head-sub">'+sub+'</div></div></div>'
      +'<div class="compare-range-inputs">'
      +'<label>From</label><input type="date" id="'+pfx+'start" value="'+sv+'">'
      +'<label>To</label><input type="date" id="'+pfx+'end" value="'+ev+'">'
      +'<button class="compare-apply" data-prefix="'+pfx+'" style="background:'+headColor+'">Apply</button>'
      +'</div>'
      +'<div class="stats-bar">'
      +'<div class="stat"><div class="stat-num">'+s.total+'</div><div class="stat-label">Campaigns</div></div>'
      +'<div class="stat"><div class="stat-num">'+s.days+'</div><div class="stat-label">Send days</div></div>'
      +'<div class="stat"><div class="stat-num">'+(s.total>0?(Math.round(s.total/Math.max(s.days,1)*10)/10):0)+'</div><div class="stat-label">Per day avg</div></div>'
      +'</div>'
      +bars(s.pc,s.total)
      +list(it)
      +'</div>';
  }
  container.innerHTML='<div class="compare-wrap">'
    +panel('Range A',compareA,aItems,'#304F59','ca-')
    +panel('Range B',compareB,bItems,'#D4873A','cb-')
    +'</div>';
}

    +'<div class="fg"><label>Campaign name</label><input id="fcn" type="text" placeholder="Enter campaign name" value="'+(c?escHtml(c.campaignName||''):'')+'">' + '</div>'
    +'<div class="fg"><label>Date</label><input id="fd" type="date" value="'+def+'"></div>'
    +'<div class="fg"><label>Subject line</label><input id="fs" type="text" placeholder="Enter subject line" value="'+(c?escHtml(c.subject):'')+'"><span id="fs-warn" style="display:none;color:#EF4444;font-size:11px;margin-top:3px;">Please fill out</span></div>'
    +'<div class="fg"><label>Preview text</label><textarea id="fp" placeholder="Enter preview text">'+(c?escHtml(c.preview):'')+'</textarea><span id="fp-warn" style="display:none;color:#EF4444;font-size:11px;margin-top:3px;">Please fill out</span></div>'
    +'<div class="frow"><div class="fg"><label>Pillar</label><select id="fl">'+po+'</select></div>'
    +'<div class="fg"><label>Channel</label><select id="fc" onchange="toggleSmsField(this.value)">'
    +'<option'+(c&&c.channel==='Email'?' selected':'')+'>Email</option>'
    +'<option'+(c&&c.channel==='SMS'?' selected':'')+'>SMS</option>'
    +'</select></div></div>'
    +'<div class="fg" id="sms-copy-field" style="display:'+(c&&c.channel==='SMS'?'block':'none')+'"><label>SMS copy</label><textarea id="fsms" placeholder="Enter SMS message text">'+(c?escHtml(c.smsCopy||''):'')+'</textarea></div>'
    +'<div class="frow"><div class="fg"><label>Status</label><select id="fst">'+so+'</select></div>'
    +'<div class="fg"><label>Audience</label><input id="fa" type="text" placeholder="Segment" value="'+(c?escHtml(c.audience||''):'')+'"></div></div>'
    +'<div class="fg"><label>Notes</label><input id="fn" type="text" placeholder="Optional" value="'+(c?escHtml(c.notes||''):'')+'"></div>'
    +'</div>';
}

function openAdd(dateStr){
  var def=dateStr||(cur.getFullYear()+'-'+pad(cur.getMonth()+1)+'-01');
  show('<div class="panel" id="add-panel">'
    +'<div class="panel-head" style="background:#304F59"><div><h3>New campaign</h3></div>'
    +'<button class="close-btn" id="modal-close">&#10005;</button></div>'
    +formHTML(def,null)
    +'<div class="pactions" style="padding:0 16px 14px">'
    +'<button class="pbtn" id="btn-cancel">Cancel</button>'
    +'<button class="pbtn primary" id="btn-save-new">Save campaign</button>'
    +'</div></div>');
  document.getElementById('modal-close').onclick=closeM;
  document.getElementById('btn-cancel').onclick=closeM;
  document.getElementById('btn-save-new').onclick=saveNew;
}

function openEdit(id){
  var c=items.find(function(x){return x.id===id;});if(!c)return;
  show('<div class="panel" id="edit-panel">'
    +'<div class="panel-head" style="background:#304F59"><div><h3>Edit campaign</h3></div>'
    +'<button class="close-btn" id="modal-close">&#10005;</button></div>'
    +formHTML(c.date,c)
    +'<div class="pactions" style="padding:0 16px 14px">'
    +'<button class="pbtn" id="btn-cancel">Cancel</button>'
    +'<button class="pbtn primary" id="btn-save-edit">Save changes</button>'
    +'</div></div>');
  document.getElementById('modal-close').onclick=closeM;
  document.getElementById('btn-cancel').onclick=closeM;
  document.getElementById('btn-save-edit').onclick=function(){saveEdit(id);};
}

function saveNew(){
  var ch=document.getElementById('fc').value;
  var s=document.getElementById('fs').value.trim();
  var pv=document.getElementById('fp').value.trim();
  var ok=true;
  if(!s&&ch!=='SMS'){document.getElementById('fs').style.outline='2px solid #EF4444';var w=document.getElementById('fs-warn');if(w)w.style.display='block';ok=false;}
  else{document.getElementById('fs').style.outline='';var w=document.getElementById('fs-warn');if(w)w.style.display='none';}
  if(!pv&&ch!=='SMS'){document.getElementById('fp').style.outline='2px solid #EF4444';var w2=document.getElementById('fp-warn');if(w2)w2.style.display='block';ok=false;}
  else{document.getElementById('fp').style.outline='';var w2=document.getElementById('fp-warn');if(w2)w2.style.display='none';}
  if(!ok)return;
  items.push({id:nid++,campaignName:document.getElementById('fcn').value.trim(),date:document.getElementById('fd').value,pillar:document.getElementById('fl').value,subject:s,preview:document.getElementById('fp').value,channel:ch,status:document.getElementById('fst').value,audience:document.getElementById('fa').value,notes:document.getElementById('fn').value,smsCopy:(document.getElementById('fsms')?document.getElementById('fsms').value:'')});
  persist();closeM();render();
}
function saveEdit(id){
  var c=items.find(function(x){return x.id===id;});if(!c)return;
  var ch=document.getElementById('fc').value;
  var s=document.getElementById('fs').value.trim();
  var pv=document.getElementById('fp').value.trim();
  var ok=true;
  if(!s&&ch!=='SMS'){document.getElementById('fs').style.outline='2px solid #EF4444';var w=document.getElementById('fs-warn');if(w)w.style.display='block';ok=false;}
  else{document.getElementById('fs').style.outline='';var w=document.getElementById('fs-warn');if(w)w.style.display='none';}
  if(!pv&&ch!=='SMS'){document.getElementById('fp').style.outline='2px solid #EF4444';var w2=document.getElementById('fp-warn');if(w2)w2.style.display='block';ok=false;}
  else{document.getElementById('fp').style.outline='';var w2=document.getElementById('fp-warn');if(w2)w2.style.display='none';}
  if(!ok)return;
  c.campaignName=document.getElementById('fcn').value.trim();
  c.date=document.getElementById('fd').value;
  c.subject=document.getElementById('fs').value;
  c.preview=document.getElementById('fp').value;
  c.pillar=document.getElementById('fl').value;
  c.channel=document.getElementById('fc').value;
  c.status=document.getElementById('fst').value;
  c.audience=document.getElementById('fa').value;
  c.notes=document.getElementById('fn').value;
  c.smsCopy=document.getElementById('fsms')?document.getElementById('fsms').value:'';
  persist();closeM();render();
}
function delItem(id){
  if(!confirm('Delete this campaign?'))return;
  items=items.filter(function(x){return x.id!==id;});
  persist();closeM();render();
}
function show(html){
  var m=document.getElementById('modal');
  m.innerHTML='<div class="overlay" id="overlay">'+html+'</div>';
  m.style.display='block';
  document.getElementById('overlay').addEventListener('click',function(e){/* outside click does not close modal */});
}
function closeM(){document.getElementById('modal').style.display='none';}

function toggleSmsField(val){
  var sf=document.getElementById('sms-copy-field');
  if(sf)sf.style.display=val==='SMS'?'block':'none';
}

function renderLegend(){
  var el=document.getElementById('legend-items');
  if(!el)return;
  var h='';
  Object.keys(PILLARS).forEach(function(p){
    var pg=PILLARS[p];
    h+='<div class="li"><div class="ld" style="background:'+pg.bg+'"></div>'+p+'</div>';
  });
  el.innerHTML=h;
}

function openAddPillar(){
  show('<div class="panel" id="pillar-panel">'    +'<div class="panel-head" style="background:#304F59"><div><h3>Add new pillar</h3></div>'    +'<button class="close-btn" id="modal-close">&#10005;</button></div>'    +'<div class="form-body">'    +'<div class="fg"><label>Pillar name</label><input id="pp-name" type="text" placeholder="e.g. Seasonal"></div>'    +'<div class="fg"><label>Colour</label><input id="pp-bg" type="color" value="#888888" style="height:36px;padding:2px 4px;width:100%"></div>'    +'</div>'    +'<div class="pactions" style="padding:0 16px 14px">'    +'<button class="pbtn" id="btn-cancel">Cancel</button>'    +'<button class="pbtn primary" id="btn-save-pillar">Add pillar</button>'    +'</div></div>');
  document.getElementById('modal-close').onclick=closeM;
  document.getElementById('btn-cancel').onclick=closeM;
  document.getElementById('btn-save-pillar').onclick=saveNewPillar;
}

function saveNewPillar(){
  var name=document.getElementById('pp-name').value.trim();
  if(!name){alert('Please enter a pillar name.');return;}
  if(PILLARS[name]){alert('A pillar with that name already exists.');return;}
  var bg=document.getElementById('pp-bg').value;
  var r=parseInt(bg.slice(1,3),16),g=parseInt(bg.slice(3,5),16),b=parseInt(bg.slice(5,7),16);
  var light='rgb('+Math.min(255,r+160)+','+Math.min(255,g+160)+','+Math.min(255,b+160)+')';
  var tr=Math.max(0,r-60),tg=Math.max(0,g-60),tb=Math.max(0,b-60);
  var text='#'+tr.toString(16).padStart(2,'0')+tg.toString(16).padStart(2,'0')+tb.toString(16).padStart(2,'0');
  PILLARS[name]={bg:bg,light:light,text:text};
  SBADGE[name]={bg:light,tx:text};
  persist();closeM();renderLegend();render();
}

/* ── Drag and drop ── */
var dragId=null;
document.addEventListener('dragstart',function(e){
  var pill=e.target.closest('.pill[data-id]');
  if(!pill)return;
  dragId=+pill.dataset.id;
  setTimeout(function(){pill.classList.add('dragging');},0);
  e.dataTransfer.effectAllowed='move';
});
document.addEventListener('dragend',function(e){
  document.querySelectorAll('.pill.dragging').forEach(function(p){p.classList.remove('dragging');});
  document.querySelectorAll('.cell.drag-over').forEach(function(c){c.classList.remove('drag-over');});
});
document.addEventListener('dragover',function(e){
  var cell=e.target.closest('.cell[data-key]');
  if(cell&&cell.dataset.other!=='1'){e.preventDefault();cell.classList.add('drag-over');}
});
document.addEventListener('dragleave',function(e){
  var cell=e.target.closest('.cell[data-key]');
  if(cell&&!cell.contains(e.relatedTarget))cell.classList.remove('drag-over');
});
document.addEventListener('drop',function(e){
  var cell=e.target.closest('.cell[data-key]');
  if(!cell||cell.dataset.other==='1'||dragId===null)return;
  e.preventDefault();
  cell.classList.remove('drag-over');
  var item=items.find(function(x){return x.id===dragId;});
  if(item&&cell.dataset.key){item.date=cell.dataset.key;persist();render();}
  dragId=null;
});

window.onload=function(){loadStored();};

</script>
